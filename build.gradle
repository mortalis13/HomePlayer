// gradle-6.7
// jdk1.8.0_91

apply plugin: 'com.android.application'

buildscript {
  repositories {
    google()
    jcenter()
    mavenLocal()
    maven {
      url "https://plugins.gradle.org/m2/"
    }
  }
  
  dependencies {
    classpath 'com.android.tools.build:gradle:4.1.0'
  }
}

allprojects {
  repositories {
    google()
    jcenter()
  }
}


// -- app
android {
  compileSdkVersion 31
  
  defaultConfig {
    applicationId "org.mortalis.homeplayer"
    vectorDrawables.useSupportLibrary = true
    
    versionCode 20
    versionName String.format('%d.%d', (int)(versionCode/10), versionCode%10)
    
    minSdkVersion 16
    targetSdkVersion 31
    
    resValue "string", "app_version", versionName
  }
  
  signingConfigs {
    release {
      storeFile file("release/homeplayer-release-key.jks")
      storePassword "homeplayer"
      keyAlias "homeplayer-alias"
      keyPassword "homeplayer"
    }
  }
  
  buildTypes {
    release {
      minifyEnabled true
      // shrinkResources true
      debuggable false
      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
      signingConfig signingConfigs.release
    }
  }
  
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      manifest.srcFile 'AndroidManifest.xml'
      java.srcDirs 'src'
      res.srcDirs 'res'
      jniLibs.srcDirs 'libs'
      assets.srcDirs 'assets'
    }

    debug.setRoot('build-types/debug')
    release.setRoot('build-types/release')
  }
  
  lintOptions {
    // checkReleaseBuilds false
    // abortOnError false
    disable "ReferenceType"
  }
}

dependencies {
  implementation fileTree(dir: 'libs', include: ['*.jar'])
  
  implementation 'androidx.appcompat:appcompat:1.4.2'
  implementation "androidx.core:core:1.8.0"
  implementation "androidx.media:media:1.6.0"
  implementation 'androidx.recyclerview:recyclerview:1.2.1'
}

def appStart() {
  return "adb shell am start -n ${android.defaultConfig.applicationId}/.MainActivity".split()
}

task appStart(type: Exec, dependsOn: 'installDebug') {
  commandLine appStart()
}

tasks.withType(JavaCompile) {
  // options.compilerArgs << '-Xlint:deprecation'
}
